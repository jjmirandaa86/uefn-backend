# Secrets: SSH_KEY, SERVER_IP, GHCR_TOKEN, UEFN_BACKEND_ENV, CERTBOT_EMAIL
name: CI/CD Deploy Web UEFN-Backend API

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    env:
      IMAGE: ghcr.io/jjmirandaa86/uefn-backend:latest
      API_DOMAIN: playface-api.acertijo.dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and Push Docker Image
        run: |
          docker build -t $IMAGE .
          docker push $IMAGE

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Sync .env and deploy scripts to server
        env:
          UEFN_BACKEND_ENV: ${{ secrets.UEFN_BACKEND_ENV }}
        run: |
          if [ -z "$UEFN_BACKEND_ENV" ]; then
            echo "❌ Falta el secret UEFN_BACKEND_ENV"
            exit 1
          fi
          printf '%s\n' "$UEFN_BACKEND_ENV" > /tmp/uefn-backend.env
          ssh -i ~/.ssh/id_rsa root@${{ secrets.SERVER_IP }} "mkdir -p /app/projects/uefn-backend/uploads /app/projects/uefn-backend/procesed"
          scp -i ~/.ssh/id_rsa /tmp/uefn-backend.env root@${{ secrets.SERVER_IP }}:/app/projects/uefn-backend.env
          scp -i ~/.ssh/id_rsa deploy/run-db-init-if-needed.sh deploy/run-health-check.sh \
            root@${{ secrets.SERVER_IP }}:/app/projects/uefn-backend/
          ssh -i ~/.ssh/id_rsa root@${{ secrets.SERVER_IP }} "chmod 600 /app/projects/uefn-backend.env && chmod +x /app/projects/uefn-backend/*.sh"
          rm -f /tmp/uefn-backend.env
          echo "✅ .env y scripts sincronizados"

      - name: Deploy container on droplet
        run: |
          ssh -i ~/.ssh/id_rsa root@${{ secrets.SERVER_IP }} << EOF
            set -e

            IMAGE=ghcr.io/jjmirandaa86/uefn-backend:latest
            ENV_FILE=/app/projects/uefn-backend.env

            echo "🔐 Login GHCR..."
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u jjmirandaa86 --password-stdin

            echo "🌐 Red app_network..."
            docker network inspect app_network >/dev/null 2>&1 || docker network create app_network

            echo "📦 Pull imagen..."
            docker pull \$IMAGE

            echo "🛑 Contenedor anterior..."
            docker stop uefn-backend || true
            docker rm uefn-backend || true

            if ! docker ps --format '{{.Names}}' | grep -qx mysql; then
              echo "❌ Contenedor mysql no está en ejecución. Despliega mysql-droplets primero."
              docker ps --format 'table {{.Names}}\t{{.Status}}'
              exit 1
            fi

            echo "🚀 Nuevo contenedor uefn-backend..."
            docker run -d \
              --name uefn-backend \
              --network app_network \
              --restart unless-stopped \
              --env-file "\$ENV_FILE" \
              -v /app/projects/uefn-backend/uploads:/app/uploads \
              -v /app/projects/uefn-backend/procesed:/app/procesed \
              \$IMAGE

            echo "Variables críticas en el contenedor:"
            docker exec uefn-backend printenv DB_HOST DB_PORT DB_USER DB_NAME API_PORT NODE_ENV 2>/dev/null || true

            echo "✅ Contenedor desplegado"
          EOF

      - name: DB schema init (primera vez)
        run: |
          ssh -o ServerAliveInterval=15 -o ServerAliveCountMax=12 -o ConnectTimeout=30 \
            -i ~/.ssh/id_rsa root@${{ secrets.SERVER_IP }} \
            "bash /app/projects/uefn-backend/run-db-init-if-needed.sh"

      - name: Health check
        run: |
          ssh -i ~/.ssh/id_rsa root@${{ secrets.SERVER_IP }} \
            "API_DOMAIN='${API_DOMAIN}' bash /app/projects/uefn-backend/run-health-check.sh"
